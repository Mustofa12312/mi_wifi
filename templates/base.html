<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="d-flex">
            <!-- Sidebar -->
            <div class="sidebar d-none d-md-block" style="width: 250px;">
                <a href="/" class="text-decoration-none brand">
                    <i class="bi bi-hdd-network text-accent"></i> Sentinel NOC
                </a>
                <ul class="nav flex-column mt-4">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/devices' %}active{% endif %}" href="/devices">
                            <i class="bi bi-laptop me-2"></i> Devices
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <a class="nav-link text-muted" href="#" onclick="scanNetwork()">
                            <i class="bi bi-arrow-clockwise me-2"></i> Scan Now
                        </a>
                    </li>
                </ul>
            </div>
            
            <!-- Main Content -->
            <div class="flex-grow-1 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function scanNetwork() {
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Scanning...';
            btn.classList.add('disabled');
            
            fetch('/api/scan')
                .then(res => res.json())
                .then(data => {
                    // It will be picked up by the auto-refresh in dashboard, 
                    // but we can restore the button after a few seconds
                    setTimeout(() => {
                        btn.innerHTML = originalHTML;
                        btn.classList.remove('disabled');
                    }, 5000);
                })
                .catch(err => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('disabled');
                });
        }
    </script>
</body>
</html>
