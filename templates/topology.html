{% extends 'base.html' %}

{% block content %}
<!-- Include Vis.js Network -->
<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style type="text/css">
    #mynetwork {
        width: 100%;
        height: 600px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        background-color: #1e293b;
    }
    .vis-network:focus {
        outline: none;
    }
</style>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="header-title mb-0">Interactive Network Topology <i class="bi bi-diagram-3 text-accent ms-2"></i></h2>
</div>

<div class="row mt-4">
    <div class="col-12">
        <div class="card table-card">
            <div class="card-header border-bottom border-secondary d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-white">Live Node Map</h5>
                <span class="badge bg-success" id="nodeCount">0 Active Devices</span>
            </div>
            <div class="card-body p-0">
                <div id="mynetwork"></div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('mynetwork');
    
    // Fetch data from our API
    fetch('/api/topology_data')
        .then(response => response.json())
        .then(data => {
            document.getElementById('nodeCount').innerText = `${data.nodes.length - 1} Active Devices`;
            
            const nodes = new vis.DataSet(data.nodes);
            const edges = new vis.DataSet(data.edges);

            const graphData = {
                nodes: nodes,
                edges: edges
            };
            
            const options = {
                nodes: {
                    shape: 'dot',
                    size: 20,
                    font: {
                        size: 14,
                        color: '#f8fafc'
                    },
                    borderWidth: 2
                },
                edges: {
                    width: 2,
                    color: { color: 'rgba(59, 130, 246, 0.5)', highlight: '#3b82f6' },
                    smooth: {
                        type: 'continuous'
                    }
                },
                groups: {
                    gateway: {
                        color: { background: '#ef4444', border: '#b91c1c' },
                        shape: 'hexagon',
                        size: 30
                    },
                    xiaomi: {
                        color: { background: '#ff6900', border: '#e65100' },
                        shape: 'dot'
                    },
                    server: {
                        color: { background: '#10b981', border: '#059669' },
                        shape: 'square'
                    },
                    device: {
                        color: { background: '#3b82f6', border: '#1d4ed8' },
                        shape: 'dot'
                    }
                },
                physics: {
                    forceAtlas2Based: {
                        gravitationalConstant: -50,
                        centralGravity: 0.01,
                        springLength: 100,
                        springConstant: 0.08
                    },
                    maxVelocity: 50,
                    solver: 'forceAtlas2Based',
                    timestep: 0.35,
                    stabilization: { iterations: 150 }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200
                }
            };

            new vis.Network(container, graphData, options);
        })
        .catch(err => {
            console.error("Failed to load topology:", err);
            container.innerHTML = '<div class="p-5 text-center text-muted">Failed to load topology data.</div>';
        });
});
</script>
{% endblock %}
